<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С 8 марта, любимые!</title>
    <!-- Font Awesome для иконок -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Библиотека конфетти -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <style>
        /* --- Стили (без изменений, всё красиво как и было) --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #fce4e8 0%, #ffe6f0 40%, #fff0f5 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 20px 40px;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: "🌸🌷🌹💐🌺";
            font-size: 70px;
            position: absolute;
            top: 10px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            opacity: 0.2;
            pointer-events: none;
            transform: rotate(-5deg);
            white-space: nowrap;
            z-index: 0;
        }
        body::after {
            content: "❤️🧡💛💚💙💜";
            font-size: 50px;
            position: absolute;
            bottom: 10px;
            right: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            opacity: 0.2;
            pointer-events: none;
            transform: rotate(3deg);
            z-index: 0;
        }
        .main-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 60px 20px 60px 20px;
            box-shadow: 0 25px 50px -8px rgba(210, 50, 120, 0.3), 0 0 0 2px #fff8 inset, 0 0 0 4px #ffb6c1 inset;
            max-width: 900px;
            width: 100%;
            padding: 30px 25px 45px;
            z-index: 10;
            border: 1px solid rgba(255,255,240,0.7);
            transition: all 0.3s ease;
        }
        .top-actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }
        .cute-btn {
            background: linear-gradient(135deg, #ff9acb, #ff6b9d);
            border: none;
            padding: 14px 32px;
            border-radius: 60px;
            font-size: 1.3rem;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 0 #d43f6b;
            box-shadow: 0 8px 0 #a12b4f, 0 12px 20px rgba(255, 105, 180, 0.4);
            cursor: pointer;
            transition: all 0.1s cubic-bezier(0.2, 0.9, 0.4, 1);
            display: inline-flex;
            align-items: center;
            gap: 12px;
            border: 2px solid #fff9;
            letter-spacing: 1px;
        }
        .cute-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #a12b4f, 0 8px 18px rgba(255, 105, 180, 0.6);
        }
        .cute-btn i {
            font-size: 1.5rem;
            filter: drop-shadow(0 2px 2px #7f1f3a);
        }
        .switch-section {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .person-btn {
            background: rgba(255, 245, 250, 0.9);
            border: 3px solid #f9a8d4;
            border-radius: 50px;
            padding: 12px 28px;
            font-size: 1.8rem;
            font-weight: 600;
            color: #b13e6b;
            box-shadow: 0 8px 0 #d46a92, 0 10px 20px #fcc6dd;
            cursor: pointer;
            transition: 0.1s linear;
            display: flex;
            align-items: center;
            gap: 15px;
            line-height: 1;
            backdrop-filter: blur(4px);
        }
        .person-btn.active {
            background: #ffd9e8;
            border-color: #ff4d8c;
            color: #a52d5a;
            box-shadow: 0 4px 0 #b3406b, 0 8px 18px #ffb3d0;
            transform: translateY(4px);
        }
        .person-btn i {
            font-size: 2rem;
            color: #ff4080;
        }
        .greeting-box {
            background: rgba(255, 255, 255, 0.6);
            border-radius: 100px 30px 100px 30px;
            padding: 35px 20px;
            margin: 20px 0 25px;
            border: 3px dashed #ff87b3;
            box-shadow: 0 0 30px #ffc1da;
            transition: all 0.4s ease;
            text-align: center;
        }
        .greeting-name {
            font-size: 4rem;
            font-weight: 800;
            background: linear-gradient(45deg, #c2185b, #e66093, #ff98c0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 20px #ffb6d9;
            margin-bottom: 15px;
            letter-spacing: 4px;
        }
        .greeting-text {
            font-size: 1.9rem;
            color: #911f4b;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 18px;
            flex-wrap: wrap;
        }
        .greeting-text i {
            font-size: 2.6rem;
            color: #ff4f79;
            animation: heartbeat 1.2s infinite;
        }
        @keyframes heartbeat {
            0% { transform: scale(1); }
            30% { transform: scale(1.3); }
            50% { transform: scale(1.1); }
            70% { transform: scale(1.25); }
            100% { transform: scale(1); }
        }
        .floating-icons {
            display: flex;
            justify-content: center;
            gap: 30px;
            font-size: 2.8rem;
            margin: 15px 0 10px;
            color: #ff7e9f;
            flex-wrap: wrap;
        }
        .floating-icons span {
            filter: drop-shadow(0 8px 12px #f9a8d4);
            animation: float 3s infinite alternate;
        }
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            100% { transform: translateY(-15px) rotate(5deg); }
        }
        .sixty-seven-btn {
            background: #fee070;
            border: 4px solid white;
            font-size: 2.2rem;
            font-weight: bold;
            color: #a52d5a;
            padding: 15px 40px;
            border-radius: 50px;
            box-shadow: 0 15px 0 #b45f2b, 0 25px 30px #ffbf69;
            margin: 30px auto 15px;
            cursor: pointer;
            transition: 0.08s linear;
            width: fit-content;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .sixty-seven-btn:active {
            transform: translateY(10px);
            box-shadow: 0 5px 0 #b45f2b, 0 18px 25px #ffa54d;
        }
        .sixty-seven-btn i {
            font-size: 2.5rem;
            color: #ec0b5f;
        }
        .sound-note {
            margin-top: 25px;
            color: #ad4170;
            background: #ffeef4;
            padding: 12px 20px;
            border-radius: 50px;
            font-size: 1.2rem;
            border: 1px solid #ff98bb;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }
        .sound-note i {
            font-size: 1.8rem;
        }
        footer {
            margin-top: 20px;
            opacity: 0.7;
            color: #b34e7a;
        }
        @media (max-width: 550px) {
            .greeting-name { font-size: 3rem; }
            .person-btn { font-size: 1.4rem; }
            .sixty-seven-btn { font-size: 1.7rem; }
        }
    </style>
</head>
<body>

<div class="main-card">
    <!-- Верхние кнопки -->
    <div class="top-actions">
        <button class="cute-btn" id="confettiButton">
            <i class="fas fa-sparkles"></i> Конфетти <i class="fas fa-star"></i>
        </button>
        <button class="cute-btn" id="playSoundBtn">
            <i class="fas fa-music"></i> Мем-звук <i class="fas fa-volume-high"></i>
        </button>
    </div>

    <!-- Переключение людей -->
    <div class="switch-section">
        <div class="person-btn active" data-person="mom">
            <i class="fas fa-crown"></i> Мама
        </div>
        <div class="person-btn" data-person="vika">
            <i class="fas fa-heart"></i> Вика
        </div>
        <div class="person-btn" data-person="polina">
            <i class="fas fa-ribbon"></i> Полина
        </div>
    </div>

    <!-- Центральный блок -->
    <div class="greeting-box" id="greetingBlock">
        <div class="greeting-name" id="personNameDisplay">Мама</div>
        <div class="greeting-text">
            <i class="fas fa-fan"></i> С 8 марта, мамуля! <i class="fas fa-fan"></i>
        </div>
    </div>

    <!-- Иконки атрибутики -->
    <div class="floating-icons">
        <span>🌷</span>
        <span>❤️</span>
        <span>🌹</span>
        <span>💐</span>
        <span>🌸</span>
        <span>💖</span>
        <span>🌺</span>
    </div>

    <!-- Кнопка 67 -->
    <div class="sixty-seven-btn" id="sixtySevenConfetti">
        <i class="fas fa-cake-candles"></i> 6 7 <i class="fas fa-balloon"></i>
    </div>

    <!-- Индикатор звука (теперь с правильной ссылкой) -->
    <div class="sound-note">
        <i class="fas fa-file-audio"></i> звук: mem.mp3 (с твоего GitHub)
    </div>

    <footer>
        🌸 С любовью и весной! 🌸
    </footer>
</div>

<script>
    (function() {
        // --- ИСПРАВЛЕННАЯ ССЫЛКА НА ЗВУК (RAW GitHub) ---
        // Это правильный адрес твоего файла на GitHub Pages
        const SOUND_URL = 'https://frutazik.github.io/pozdravlenie_8_March/mem.mp3';

        // --- Данные для получателей ---
        const personData = {
            mom: { name: 'Мама', greeting: 'С 8 марта, мамуля!' },
            vika: { name: 'Вика', greeting: 'С 8 марта, Викуля!' },
            polina: { name: 'Полина', greeting: 'С 8 марта, Полиночка!' }
        };

        // Элементы DOM
        const personBtns = document.querySelectorAll('.person-btn');
        const personNameDisplay = document.getElementById('personNameDisplay');
        const greetingTextDiv = document.querySelector('.greeting-text');
        const confettiBtn = document.getElementById('confettiButton');
        const sixtySevenBtn = document.getElementById('sixtySevenConfetti');
        const playSoundBtn = document.getElementById('playSoundBtn');

        // --- Работа со звуком ---
        let audio = null;

        // Функция для создания и воспроизведения звука
        function playMemSound() {
            // Создаем новый объект Audio каждый раз при нажатии,
            // чтобы избежать проблем с загрузкой и гарантировать воспроизведение
            try {
                // Если audio уже существует и играет - останавливаем
                if (audio) {
                    audio.pause();
                    audio.currentTime = 0;
                }
                
                // Создаем новый экземпляр
                audio = new Audio(SOUND_URL);
                
                // Добавляем обработчики для отладки
                audio.oncanplaythrough = () => console.log('Звук загружен и готов к воспроизведению');
                audio.onerror = (e) => {
                    console.error('Ошибка загрузки звука:', e);
                    alert('Не удалось загрузить звук. Проверь, есть ли файл mem.mp3 по адресу:\n' + SOUND_URL);
                };
                
                // Пытаемся воспроизвести
                let playPromise = audio.play();
                
                if (playPromise !== undefined) {
                    playPromise.catch(error => {
                        console.warn('Воспроизведение не удалось:', error);
                        // Если браузер блокирует автовоспроизведение, покажем подсказку
                        alert('Нажми на кнопку ещё раз, чтобы включить звук 🔈 (нужно взаимодействие с сайтом)');
                    });
                }
            } catch (err) {
                console.error('Критическая ошибка Audio:', err);
                alert('Что-то пошло не так со звуком. Но конфетти работают! 🎉');
            }
        }

        // Назначаем обработчик клика на кнопку звука
        playSoundBtn.addEventListener('click', playMemSound);

        // --- Функции конфетти ---
        function fireSixtySevenConfetti() {
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#ff8cba', '#ffd166', '#ffb3c6'] });
            setTimeout(() => {
                confetti({ particleCount: 80, angle: 60, spread: 55, origin: { x: 0, y: 0.5 }, colors: ['#f9acbc', '#fdcedf'] });
                confetti({ particleCount: 80, angle: 120, spread: 55, origin: { x: 1, y: 0.5 }, colors: ['#b3e0ff', '#fbc2c2'] });
            }, 150);
            for (let i = 0; i < 67; i++) {
                setTimeout(() => {
                    confetti({ particleCount: 2, spread: 10, origin: { x: 0.3 + (i % 3) * 0.2, y: 0.4 }, colors: ['#e63946', '#f4d03f'] });
                }, i * 10);
            }
            confetti({ particleCount: 67, spread: 100, origin: { y: 0.5, x: 0.5 }, colors: ['#c44569', '#f3a683'] });
        }

        sixtySevenBtn.addEventListener('click', fireSixtySevenConfetti);
        
        confettiBtn.addEventListener('click', () => {
            confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 } });
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.5, x: 0.2 }, colors: ['#bbded6', '#fae3e3'] });
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.5, x: 0.8 }, colors: ['#fbc1c1', '#c6d9f0'] });
        });

        // --- Переключение персоналий ---
        function setActivePerson(personKey) {
            personBtns.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.person === personKey);
            });

            const data = personData[personKey];
            if (data) {
                personNameDisplay.innerText = data.name;
                // Меняем текст поздравления, но сохраняем иконки по бокам
                const leftIcon = greetingTextDiv.children[0] ? greetingTextDiv.children[0].outerHTML : '<i class="fas fa-fan"></i>';
                const rightIcon = greetingTextDiv.children[2] ? greetingTextDiv.children[2].outerHTML : '<i class="fas fa-fan"></i>';
                greetingTextDiv.innerHTML = `${leftIcon} ${data.greeting} ${rightIcon}`;
            }
        }

        personBtns.forEach(btn => {
            btn.addEventListener('click', (e) => setActivePerson(e.currentTarget.dataset.person));
        });

        // Устанавливаем начальное состояние (Мама)
        setActivePerson('mom');

        // Финальное сообщение в консоль, что всё готово
        console.log('Сайт работает! Звук загружается с:', SOUND_URL);
    })();
</script>

<!-- Маленькая иконка в углу -->
<div style="position: fixed; bottom: 15px; right: 15px; opacity:0.5; z-index: 99; font-size: 2rem;">🌷</div>
</body>
</html>
